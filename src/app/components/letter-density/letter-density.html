<section class="density-section">
  <h2 class="density-heading">Letter Density</h2>

  @if (letterDensity.length === 0) {
    <p class="empty-message">No characters found. Start typing to see letter density.</p>
  } @else {
    <div class="density-list" role="list">
      @for (item of visibleLetters; track item.letter) {
        <div class="density-row" role="listitem">
          <span class="density-letter">{{ item.letter }}</span>
          <div class="bar-track" role="progressbar" [attr.aria-valuenow]="item.percentage" aria-valuemin="0" aria-valuemax="100" [attr.aria-label]="item.letter + ': ' + item.count + ' occurrences'">
            <div class="bar-fill" [style.width.%]="barWidth(item.count)"></div>
          </div>
          <span class="density-stat">{{ item.count }} ({{ item.percentage.toFixed(2) }}%)</span>
        </div>
      }
    </div>

    @if (letterDensity.length > 5) {
      <button class="toggle-btn" (click)="toggleShowAll()" [attr.aria-expanded]="showAll">
        @if (showAll) {
          <span>See less</span>
          <!-- Chevron up -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="18 15 12 9 6 15"/>
          </svg>
        } @else {
          <span>See more</span>
          <!-- Chevron down -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        }
      </button>
    }
  }
</section>
