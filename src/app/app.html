<div class="app-wrapper">
  <app-header
    [isDarkTheme]="isDarkTheme"
    (themeToggle)="onThemeToggle()"
  />

  <main class="main-content">
    <h1 class="hero-heading">
      Analyze your text<br />in real&#8209;time.
    </h1>

    <app-text-input
      [text]="text"
      [isOverLimit]="isOverLimit"
      (textChange)="onTextChange($event)"
    />

    <app-controls
      [excludeSpaces]="excludeSpaces"
      [hasCharLimit]="hasCharLimit"
      [characterLimit]="characterLimit"
      [readingTime]="readingTime"
      [isOverLimit]="isOverLimit"
      (excludeSpacesChange)="onExcludeSpacesChange($event)"
      (hasCharLimitChange)="onHasCharLimitChange($event)"
      (characterLimitChange)="onCharacterLimitChange($event)"
    />

    <app-stats-cards
      [charCount]="charCount"
      [wordCount]="wordCount"
      [sentenceCount]="sentenceCount"
      [excludeSpaces]="excludeSpaces"
    />

    <app-letter-density
      [letterDensity]="letterDensity"
    />
  </main>
</div>
